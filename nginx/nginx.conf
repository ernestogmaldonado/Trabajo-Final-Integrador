# Copiar o incluir este archivo en la instalacion de nginx.
# En Windows: editar la ruta "root" con la ruta completa a frontend\dist\frontend\browser

server {
    listen 80;
    server_name localhost;

    # Cambiar por la ruta real del proyecto, ejemplo:
    # root C:/Users/ernes/.../tp final/frontend/dist/frontend/browser;
    root frontend/dist/frontend/browser;
    index index.html;

    # API NestJS (PM2 en puerto 3000)
    location /api/ {
        proxy_pass http://127.0.0.1:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Angular (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
